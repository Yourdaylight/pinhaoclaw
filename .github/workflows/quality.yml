name: pinhaoclaw-quality

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: pinhaoclaw-frontend/package-lock.json

      - name: Run quality gate
        run: ./tools/quality-gate.sh ci